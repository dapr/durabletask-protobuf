syntax = "proto3";

package durabletask.protos.v1;

option csharp_namespace = "Dapr.DurableTask.Protobuf";
option java_package = "io.dapr.durabletask.implementation.protobuf";
option go_package = "/api/protos";

import "workflow_messages.proto";
import "history_events.proto";
import "entity_messages.proto";
import "workflow_service.proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// BackendService is the gRPC service used by Durable Task Framework (DTFx)
// backend implementations to manage workflow state and dispatch work items.
service BackendService {
    // Creates a new workflow instance.
    rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);

    // Sends an event to a workflow instance. Used for raising external events
    // and for lifecycle events such as terminate, suspend, and resume.
    rpc AddEvent(AddEventRequest) returns (AddEventResponse);

    // Returns metadata about a workflow instance.
    rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);

    // Returns metadata about an entity instance.
    rpc GetEntity(GetEntityRequest) returns (GetEntityResponse);

    // Returns metadata about multiple workflow instances using a query.
    rpc QueryInstances(QueryInstancesRequest) returns (QueryInstancesResponse);

    // Returns metadata for multiple entities using a query.
    rpc QueryEntities(QueryEntitiesRequest) returns (QueryEntitiesResponse);

    // Waits for a workflow to reach a terminal state and then returns metadata
    // for that workflow.
    rpc WaitForInstance(WaitForInstanceRequest) returns (WaitForInstanceResponse);

    // Purges the state of one or more workflow instances.
    rpc PurgeInstances(PurgeInstancesRequest) returns (PurgeInstancesResponse);

    // Cleans entity storage.
    rpc CleanEntityStorage(CleanEntityStorageRequest) returns (CleanEntityStorageResponse);

    // Starts a server stream for receiving work items.
    rpc GetWorkItems(GetWorkItemsRequest) returns (stream WorkItem);

    // Gets workflow runtime state (history, etc.) for a given workflow instance.
    rpc GetWorkflowRuntimeState(GetWorkflowRuntimeStateRequest) returns (GetWorkflowRuntimeStateResponse);

    // Deprecated: use GetWorkflowRuntimeState instead.
    rpc GetOrchestrationRuntimeState(GetWorkflowRuntimeStateRequest) returns (GetWorkflowRuntimeStateResponse);

    // Gets the history of a workflow instance as a stream of events.
    rpc StreamInstanceHistory(StreamInstanceHistoryRequest) returns (stream HistoryChunk);

    // Completes an outstanding activity work item and adds a new event to the
    // target workflow's inbox.
    rpc CompleteActivityWorkItem(CompleteActivityWorkItemRequest) returns (CompleteActivityWorkItemResponse);

    // Abandons an outstanding activity work item. Abandoned work items will be
    // re-delivered after some delay.
    rpc AbandonActivityWorkItem(AbandonActivityWorkItemRequest) returns (AbandonActivityWorkItemResponse);

    // Completes an outstanding workflow work item and adds a new event to the
    // target workflow's inbox.
    rpc CompleteWorkflowWorkItem(CompleteWorkflowWorkItemRequest) returns (CompleteWorkflowWorkItemResponse);

    // Deprecated: use CompleteWorkflowWorkItem instead.
    rpc CompleteOrchestrationWorkItem(CompleteWorkflowWorkItemRequest) returns (CompleteWorkflowWorkItemResponse);

    // Abandons an outstanding workflow work item. Abandoned work items will be
    // re-delivered after some delay.
    rpc AbandonWorkflowWorkItem(AbandonWorkflowWorkItemRequest) returns (AbandonWorkflowWorkItemResponse);

    // Deprecated: use AbandonWorkflowWorkItem instead.
    rpc AbandonOrchestrationWorkItem(AbandonWorkflowWorkItemRequest) returns (AbandonWorkflowWorkItemResponse);

    // Completes an outstanding entity work item.
    rpc CompleteEntityWorkItem(CompleteEntityWorkItemRequest) returns (CompleteEntityWorkItemResponse);

    // Abandons an outstanding entity work item. Abandoned work items will be
    // re-delivered after some delay.
    rpc AbandonEntityWorkItem(AbandonEntityWorkItemRequest) returns (AbandonEntityWorkItemResponse);

    // Sends a health check ping to the backend service.
    rpc Ping(PingRequest) returns (PingResponse);

    // Returns the current metrics for the backend service.
    rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

    rpc ListInstanceIDs(ListInstanceIDsRequest) returns (ListInstanceIDsResponse);
    rpc GetInstanceHistory(GetInstanceHistoryRequest) returns (GetInstanceHistoryResponse);
}

// AddEventRequest is the request payload for adding new workflow events.
message AddEventRequest {
    // The ID of the workflow instance to send an event to.
    WorkflowInstance instance = 1;
    // The event to send to the workflow.
    HistoryEvent event = 2;
}

// AddEventResponse is the response from AddEvent.
message AddEventResponse {
    // No fields.
}

// WaitForInstanceRequest is the request payload for waiting for instance
// completion.
message WaitForInstanceRequest {
    string instanceId = 1;
    bool getInputsAndOutputs = 2;
}

// WaitForInstanceResponse is the response from WaitForInstance.
message WaitForInstanceResponse {
    bool exists = 1;
    WorkflowState workflowState = 2;
}

// GetWorkflowRuntimeStateRequest is the request payload for fetching workflow
// runtime state.
message GetWorkflowRuntimeStateRequest {
    // The ID of the target workflow instance.
    WorkflowInstance instance = 1;
}

// GetWorkflowRuntimeStateResponse is the response from GetWorkflowRuntimeState.
message GetWorkflowRuntimeStateResponse {
    // The existing history events for the target workflow instance.
    repeated HistoryEvent history = 1;
}

// CompleteActivityWorkItemRequest is the request payload for completing an
// activity work item.
message CompleteActivityWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;

    // The response event sent to the workflow executor.
    // Must be either a TaskCompleted event or a TaskFailed event.
    HistoryEvent responseEvent = 2;
}

// CompleteActivityWorkItemResponse is the response from
// CompleteActivityWorkItem.
message CompleteActivityWorkItemResponse {
    // No fields.
}

// AbandonActivityWorkItemRequest is the request payload for abandoning an
// activity work item.
message AbandonActivityWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;
}

// AbandonActivityWorkItemResponse is the response from AbandonActivityWorkItem.
message AbandonActivityWorkItemResponse {
    // No fields.
}

// CompleteWorkflowWorkItemRequest is the request payload for completing a
// workflow work item.
message CompleteWorkflowWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;
    WorkflowInstance instance = 2;
    WorkflowStatus runtimeStatus = 3;
    google.protobuf.StringValue customStatus = 4;
    repeated HistoryEvent newHistory = 5;
    repeated HistoryEvent newTasks = 6;
    repeated HistoryEvent newTimers = 7;
    repeated WorkflowMessage newMessages = 8;

    // The number of work item events that were processed by the workflow
    // executor. If not set, the service should assume all events were processed.
    google.protobuf.Int32Value numEventsProcessed = 9;
}

// CompleteWorkflowWorkItemResponse is the response from
// CompleteWorkflowWorkItem.
message CompleteWorkflowWorkItemResponse {
    // No fields.
}

// WorkflowMessage is a message to be delivered to a workflow by the backend.
message WorkflowMessage {
    // The ID of the workflow instance to receive the message.
    WorkflowInstance instance = 1;
    // The event payload to be received by the target workflow.
    HistoryEvent event = 2;
}

// AbandonWorkflowWorkItemRequest is the request payload for abandoning a
// workflow work item.
message AbandonWorkflowWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;
}

// AbandonWorkflowWorkItemResponse is the response from
// AbandonWorkflowWorkItem.
message AbandonWorkflowWorkItemResponse {
    // No fields.
}

// CompleteEntityWorkItemRequest is the request payload for completing an
// entity work item.
message CompleteEntityWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;

    // The execution ID of the scheduler.
    string executionId = 2;

    // The number of requests that were executed. If this is smaller than the
    // number of operations in the work item, the remaining operations will be
    // re-sent with the next work item.
    int32 numberOperationsExecuted = 3;

    // The state of the entity after the executed operations, or null if none.
    google.protobuf.StringValue entityState = 4;

    // The messages sent by the executed operations. Must include any responses
    // to operation calls.
    repeated WorkflowMessage messages = 5;
}

// CompleteEntityWorkItemResponse is the response from CompleteEntityWorkItem.
message CompleteEntityWorkItemResponse {
    // No fields.
}

// AbandonEntityWorkItemRequest is the request payload for abandoning an entity
// work item.
message AbandonEntityWorkItemRequest {
    // The completion token provided when the work item was fetched.
    string completionToken = 1;
    string reason = 2;
}

// AbandonEntityWorkItemResponse is the response from AbandonEntityWorkItem.
message AbandonEntityWorkItemResponse {
    // No fields.
}

// PingRequest is the request payload for health check pings.
message PingRequest {
    // No fields.
}

// PingResponse is the response from Ping.
message PingResponse {
    // No fields.
}

// BackendWorkflowState holds the full in-memory/storage state of a workflow.
message BackendWorkflowState {
    repeated HistoryEvent inbox = 1;
    repeated HistoryEvent history = 2;
    google.protobuf.StringValue customStatus = 3;
    uint64 generation = 4;
}

// CreateWorkflowInstanceRequest is used to create a new workflow instance in
// the backend store.
message CreateWorkflowInstanceRequest {
    HistoryEvent startEvent = 1;
    optional WorkflowIdReusePolicy policy = 2;
}

// WorkflowMetadata holds summary metadata for a workflow instance.
message WorkflowMetadata {
    string instanceId = 1;
    string name = 2;
    WorkflowStatus runtimeStatus = 3;
    google.protobuf.Timestamp createdAt = 4;
    google.protobuf.Timestamp lastUpdatedAt = 5;
    google.protobuf.StringValue input = 6;
    google.protobuf.StringValue output = 7;
    google.protobuf.StringValue customStatus = 8;
    TaskFailureDetails failureDetails = 9;
    google.protobuf.Timestamp completedAt = 10;
    string parentInstanceId = 11;
}

// WorkflowStateMetadata holds size/generation metadata for a workflow's stored
// state.
message WorkflowStateMetadata {
    uint64 inboxLength = 1;
    uint64 historyLength = 2;
    uint64 generation = 3;
}

// DurableTimer represents a pending durable timer associated with a workflow
// instance.
message DurableTimer {
    HistoryEvent timerEvent = 1;
    uint64 generation = 2;
}

// GetMetricsRequest is the request payload for fetching backend metrics.
message GetMetricsRequest {
    // No fields.
}

// GetMetricsResponse is the response from GetMetrics.
message GetMetricsResponse {
    // The current metrics for the backend service.
    BackendMetrics metrics = 1;
}

// BackendMetrics holds operational metrics for the backend service.
message BackendMetrics {
    // Activity work item metrics.
    WorkItemMetrics activityWorkItems = 1 [json_name="activityWorkItems"];
    // Workflow work item metrics.
    WorkItemMetrics workflowWorkItems = 2 [json_name="workflowWorkItems"];
    // Entity work item metrics.
    WorkItemMetrics entityWorkItems = 3 [json_name="entityWorkItems"];
    // Metrics related to workers currently connected to the backend.
    ConnectedWorkerMetrics connectedWorkers = 4 [json_name="connectedWorkers"];
}

// WorkItemMetrics holds metrics about a category of work items.
message WorkItemMetrics {
    // Number of work items that are queued and waiting to be processed.
    int32 pending = 1 [json_name="pending"];
    // Number of work items that are currently being processed.
    int32 active = 2 [json_name="active"];
    // Age of the oldest work item in the queue, in seconds.
    int32 oldestAgeInSeconds = 3 [json_name="oldestAgeInSeconds"];
}

// ConnectedWorkerMetrics holds metrics about connected workers.
message ConnectedWorkerMetrics {
    // Number of worker instances currently connected to the backend.
    int32 count = 1 [json_name="count"];
}
